name: Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm -s tsc --noEmit

      - name: Run tests
        run: pnpm -s vitest run --reporter=basic

  build_and_push:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Docker credentials
        id: guard
        run: |
          if [ -z "${DOCKER_USERNAME}" ] || [ -z "${DOCKER_PASSWORD}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Docker credentials missing; skipping image build/push."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set image metadata
        id: meta
        if: ${{ steps.guard.outputs.enabled == 'true' }}
        run: |
          IMAGE_REF="${DOCKER_USERNAME}/crazyamsel:${{ github.sha }}"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_REF=${IMAGE_REF}" >> "$GITHUB_ENV"

      - name: Login to Docker Hub
        if: ${{ steps.guard.outputs.enabled == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and push image
        if: ${{ steps.guard.outputs.enabled == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/crazyamsel:latest
            ${{ env.DOCKER_USERNAME }}/crazyamsel:${{ github.sha }}

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      IMAGE_REF: ${{ needs.build_and_push.outputs.image_ref }}
    steps:
      - name: Check deploy SSH secrets
        id: guard
        run: |
          if [ -z "${DEPLOY_HOST}" ] || [ -z "${DEPLOY_USER}" ] || [ -z "${DEPLOY_SSH_KEY}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Deploy SSH secrets missing; skipping remote deploy."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy over SSH
        if: ${{ steps.guard.outputs.enabled == 'true' }}
        uses: appleboy/ssh-action@v1.0.3
        env:
          GIT_SHA: ${{ github.sha }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DOCKER_USERNAME: ${{ env.DOCKER_USERNAME }}
          IMAGE_REF: ${{ env.IMAGE_REF }}
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_SSH_KEY }}
          envs: GIT_SHA,DEPLOY_PATH,DOCKER_USERNAME,IMAGE_REF
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="${DEPLOY_PATH:-/opt/crazyamsel}"
            cd "$APP_DIR"

            EFFECTIVE_IMAGE="${IMAGE_REF:-${DOCKER_USERNAME}/crazyamsel:latest}"

            if [ -f ".env" ]; then
              if grep -q '^SERVER_BUILD_ID=' .env; then
                sed -i "s/^SERVER_BUILD_ID=.*/SERVER_BUILD_ID=${GIT_SHA}/" .env
              else
                echo "SERVER_BUILD_ID=${GIT_SHA}" >> .env
              fi
              if grep -q '^API_IMAGE=' .env; then
                sed -i "s|^API_IMAGE=.*|API_IMAGE=${EFFECTIVE_IMAGE}|" .env
              else
                echo "API_IMAGE=${EFFECTIVE_IMAGE}" >> .env
              fi
            else
              {
                echo "SERVER_BUILD_ID=${GIT_SHA}"
                echo "API_IMAGE=${EFFECTIVE_IMAGE}"
              } > .env
            fi

            docker compose pull
            docker compose up -d
            docker compose ps

  verify_deploy:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DEPLOY_API_URL: ${{ secrets.DEPLOY_API_URL }}
    steps:
      - name: Check verify API URL secret
        id: guard
        run: |
          if [ -z "${DEPLOY_API_URL}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "DEPLOY_API_URL missing; skipping verify step."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: ${{ steps.guard.outputs.enabled == 'true' }}
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: ${{ steps.guard.outputs.enabled == 'true' }}
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: ${{ steps.guard.outputs.enabled == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: ${{ steps.guard.outputs.enabled == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Verify live deployment
        if: ${{ steps.guard.outputs.enabled == 'true' }}
        env:
          VERIFY_API_URL: ${{ env.DEPLOY_API_URL }}
          EXPECT_BUILD_ID: ${{ github.sha }}
          TELEMETRY_TOKEN: ${{ secrets.TELEMETRY_TOKEN }}
          SOAK_CLIENTS: "4"
          SOAK_DURATION_MS: "10000"
        run: pnpm -s verify:deploy
