services:
  # MySQL Database
  db:
    image: mysql:8
    container_name: crazyamsel-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: crazyamsel
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crazyamsel-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped

  # Backend API Server
  api:
    image: ${API_IMAGE}
    container_name: crazyamsel-api
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://root:${DB_ROOT_PASSWORD:-root}@db:3306/crazyamsel
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://redis:6379
      ENFORCE_SINGLE_SOCKET_INSTANCE: ${ENFORCE_SINGLE_SOCKET_INSTANCE:-true}
      SINGLE_SOCKET_LOCK_TTL_SEC: ${SINGLE_SOCKET_LOCK_TTL_SEC:-45}
      ROOM_RECONCILE_INTERVAL_MS: ${ROOM_RECONCILE_INTERVAL_MS:-60000}
      TELEMETRY_TOKEN: ${TELEMETRY_TOKEN:-}
      SERVER_BUILD_ID: ${SERVER_BUILD_ID:-dev}
      ADMIN_USER_IDS: ${ADMIN_USER_IDS:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8081,http://localhost:3000,https://*.expo.dev,https://*.exp.direct,https://*.manus.space}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET}
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  mysql_data:
